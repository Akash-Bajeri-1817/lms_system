spring:
  application:
    name: lms-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/lms_db?options=-c%20timezone=Asia/Kolkata
    username: lms_user
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema, not Hibernate
    show-sql: true                # print every SQL query in console
    properties:
      hibernate:
        format_sql: true          # make SQL readable in console

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.lms: DEBUG                # see all your own code's logs
    org.springframework.security: DEBUG   # see security decisions

application:
  security:
    jwt:
      secret-key: 3f8a9b2c1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
      access-token-expiration: 900000        # 15 minutes in ms
      refresh-token-expiration: 604800000    # 7 days in ms