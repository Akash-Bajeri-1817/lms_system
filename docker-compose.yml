version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - lms-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped   # add this line

volumes:
  lms-postgres-data:

